            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            width: 4px;
        }
        .scrollbar-thin::-webkit-scrollbar-track {
            background: #191b23;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: #424754;
            border-radius: 2px;
        }
        .node-active {
            box-shadow: 0 0 15px rgba(173, 198, 255, 0.3);
        }
        .telemetry-line::before {
            content: '>';
            margin-right: 8px;
            color: #424754;
        }
